<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulator Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .auth-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .auth-card { width: min(720px, 100%); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <main class="auth-wrap">
    <section class="card stack auth-card">
      <h2>Simulator Sign In / Sign Up</h2>
      <p class="muted">Signup works only for allowlisted emails inserted by main developer.</p>

      <div class="grid cols-4">
        <label>Email
          <input id="auth-email" type="email" placeholder="dev@example.com" />
        </label>
        <label>Password
          <input id="auth-password" type="password" placeholder="********" />
        </label>
      </div>

      <div class="row">
        <button class="btn" id="btn-login">Login</button>
        <button class="btn btn-secondary" id="btn-signup">Sign Up</button>
        <button class="btn btn-secondary" id="btn-check">Check Eligibility</button>
      </div>

      <pre id="auth-output" class="codebox">Ready.</pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js"></script>
  <script src="/auth.js"></script>
</body>
</html>
